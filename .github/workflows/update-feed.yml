name: Daily feed sync

on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:

concurrency:
  group: update-feed
  cancel-in-progress: true
  
permissions:
  contents: write

jobs:
  update-feed:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch latest remote state
        run: |
          git fetch origin main
          git reset --hard origin/main

      - name: Run fetch and localization script
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
          FEED_API_URL: ${{ vars.FEED_API_URL }}
        run: python .github/scripts/update-feed.py

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add feed/data.hash feed/data.uk.json

          if ! git diff --cached --quiet; then
            git commit -m "Update feed data (Ukrainian localization)"
            git pull --rebase origin main
            git push origin main
          else
            echo "No changes to commit"
          fi
